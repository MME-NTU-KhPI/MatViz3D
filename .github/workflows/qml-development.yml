name: Build MatViz3D

on:
  push:
    branches:
      - qml-development
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux Qt Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: qml-development
          fetch-depth: 0

      - name: Set version
        run: echo "APP_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo '0.1.0')" >> $GITHUB_ENV

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'linux'
          target: 'desktop'
          modules: 'qt5compat'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            mesa-common-dev \
            libxkbcommon-x11-0 \
            libfontconfig1-dev \
            libx11-dev \
            libfuse2 \
            ruby ruby-dev \
            rpm
          sudo gem install --no-document fpm

      - name: Configure
        run: |
          qmake MatViz3D.pro CONFIG+=release

      - name: Build
        run: |
          make -j$(nproc)

      - name: Prepare packaging files
        run: |
          mkdir -p packaging/linux/usr/bin
          mkdir -p packaging/linux/usr/share/applications
          mkdir -p packaging/linux/usr/share/icons/hicolor/256x256/apps
 
          cp MatViz3D packaging/linux/usr/bin/
          cp "img/MatViz3D.png" packaging/linux/usr/share/icons/hicolor/256x256/apps/MatViz3D.png
 
          # No leading whitespace — linuxdeployqt is strict about .desktop format
          printf '[Desktop Entry]\nType=Application\nName=MatViz3D\nExec=MatViz3D\nIcon=MatViz3D\nCategories=Science;Education;Graphics;\nTerminal=false\n' \
            > packaging/linux/usr/share/applications/matviz3d.desktop

      - name: Download linuxdeploy and Qt plugin
        run: |
          wget -q -O linuxdeploy.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-qt.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy.AppImage linuxdeploy-plugin-qt.AppImage

      - name: Debug bundled binary
        run: |
          file packaging/linux/usr/bin/MatViz3D
          ldd packaging/linux/usr/bin/MatViz3D || true

      - name: Bundle Qt libraries
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          QML_SOURCES_PATHS: ${{ github.workspace }}
          LD_LIBRARY_PATH: ${{ github.workspace }}/Qt/6.6.3/gcc_64/lib
        run: |
          # Remove Mimer SQL driver — it requires libmimerapi.so which is not on the runner
          rm -f "${{ github.workspace }}/Qt/6.6.3/gcc_64/plugins/sqldrivers/libqsqlmimer.so"
          export PATH="${{ github.workspace }}/Qt/6.6.3/gcc_64/bin:$PATH"
          ./linuxdeploy.AppImage \
            --appdir packaging/linux \
            --plugin qt \
            --verbosity=2

      - name: Build DEB package
        run: |
          fpm -s dir -t deb \
            -n matviz3d \
            -v "${{ env.APP_VERSION }}" \
            --architecture amd64 \
            --description "Tool for microstructure modeling using cellular automata" \
            --maintainer "MME-NTU-KhPI" \
            --license "MIT" \
            -C packaging/linux \
            .

      - name: Build RPM package
        run: |
          fpm -s dir -t rpm \
            -n matviz3d \
            -v "${{ env.APP_VERSION }}" \
            --architecture x86_64 \
            --description "Tool for microstructure modeling using cellular automata" \
            --maintainer "MME-NTU-KhPI" \
            --license "MIT" \
            -C packaging/linux \
            .

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: MatViz3D-linux-packages
          path: |
            *.deb
            *.rpm

  build-windows:
    name: Windows Qt Build
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: qml-development
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qt5compat'

      - name: Install MinGW tools
        shell: pwsh
        run: |
          choco install mingw -y
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure
        shell: cmd
        run: |
          qmake MatViz3D.pro CONFIG+=release

      - name: Build
        shell: cmd
        run: |
          mingw32-make -j2

      - name: Create dist folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item release\MatViz3D.exe dist\
          & windeployqt --release --no-translations dist\MatViz3D.exe
          Copy-Item images\Plugin_icon.ico dist\

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      - name: Build installer
        shell: powershell
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\MatViz3D.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: MatViz3D-windows-installer
          path: packaging\windows\Output\MatViz3D-Setup.exe